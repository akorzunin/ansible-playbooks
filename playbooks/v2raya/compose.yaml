services:
  v2raya:
    image: mzz2017/v2raya:v2.2.7.5@sha256:06abe4f4f16876a6695dec1f92d4c02a3ac724253a62b94702502c331993d59e
    container_name: v2raya
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - V2RAYA_V2RAY_BIN=/usr/local/bin/xray
    volumes:
      - /lib/modules:/lib/modules:ro
      - /etc/resolv.conf:/etc/resolv.conf
      - /etc/v2raya:/etc/v2raya
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 128M
        reservations:
          cpus: "0.15"
          memory: 64M
