services:
  hbbs:
    container_name: rustdesk-hbbs
    image: rustdesk/rustdesk-server:1.1.15@sha256:10818ec05b179039c6660f4d8e74b303f0db2858bbad2b18e24992ea22d54cd6
    restart: unless-stopped
    networks:
      - rustdesk_network
    ports:
      - "915:21115"
      - "916:21116"
      - "916:21116/udp"
      - "918:21118"
    volumes:
      - ./data:/root
    command: hbbs
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  hbbr:
    container_name: rustdesk-hbbr
    image: rustdesk/rustdesk-server:1.1.15@sha256:10818ec05b179039c6660f4d8e74b303f0db2858bbad2b18e24992ea22d54cd6
    restart: unless-stopped
    networks:
      - rustdesk_network
    ports:
      - "917:21117"
      - "919:21119"
    volumes:
      - ./data:/root
    command: hbbr
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

networks:
  rustdesk_network:
    driver: bridge
